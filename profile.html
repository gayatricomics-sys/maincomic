<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile - ComicForge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 50px auto;
            color: white;
            padding: 20px;
        }

        .dashboard-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .dashboard-header i {
            font-size: 40px;
            margin-right: 20px;
            color: var(--primary);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFE100;
            margin-top: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }

        .btn-save {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-save:hover {
            background: #4b52ff;
        }
    </style>
</head>

<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-user-circle"></i>
            <h1><a href="index.html" style="color:white; text-decoration:none;">ComicForge</a> / Profile</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn secondary">Back to App</a>
        </div>
    </header>

    <div class="profile-container">
        <!-- Dashboard Section -->
        <div class="dashboard-card">
            <div class="dashboard-header">
                <i class="fa-solid fa-id-card"></i>
                <div>
                    <h2 id="user-email">Loading...</h2>
                    <span id="user-role"
                        style="background:var(--accent); color:black; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:bold;">User</span>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-label">Available Credits</div>
                    <div class="stat-value" id="credit-balance">...</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Account Status</div>
                    <div class="stat-value" style="color:var(--accent);">Active</div>
                </div>
            </div>
            <div style="margin-top:20px; text-align:center;">
                <a href="pricing.html" class="btn secondary" style="color:#FFE100;">Get More Credits</a>
            </div>
        </div>

        <!-- Security Section -->
        <div class="dashboard-card">
            <h3><i class="fa-solid fa-lock"></i> Change Password</h3>
            <p style="opacity:0.7; margin-bottom:20px; font-size:14px;">Ensure you remember your old password to set a
                new one.</p>

            <form id="password-form">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="old-pass" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-pass" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-pass" required>
                </div>
                <button type="submit" class="btn-save">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // 1. Load Profile
            try {
                const res = await fetch('/api/user/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error("Failed to load profile");

                const user = await res.json();
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-role').innerText = user.role.toUpperCase();
                document.getElementById('credit-balance').innerText = user.credits;

                if (user.role === 'admin') {
                    document.getElementById('credit-balance').innerText = "Unlimited";
                }
            } catch (e) {
                alert("Session expired");
                window.location.href = 'login.html';
            }

            // 2. Change Password Handler
            document.getElementById('password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPass = document.getElementById('old-pass').value;
                const newPass = document.getElementById('new-pass').value;
                const confirmPass = document.getElementById('confirm-pass').value;

                if (newPass !== confirmPass) {
                    alert("New passwords do not match!");
                    return;
                }

                try {
                    const btn = e.target.querySelector('button');
                    btn.disabled = true;
                    btn.innerText = "Updating...";

                    const res = await fetch('/api/auth/change-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ old_password: oldPass, new_password: newPass })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        alert("Password updated successfully!");
                        e.target.reset();
                    } else {
                        alert("Failed: " + data.error);
                    }
                } catch (err) {
                    alert("Error: " + err.message);
                } finally {
                    const btn = e.target.querySelector('button');
                    btn.disabled = false;
                    btn.innerText = "Update Password";
                }
            });
        });
    </script>
</body>

</html>
