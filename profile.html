<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile - ComicForge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 50px auto;
            color: white;
            padding: 20px;
        }

        .dashboard-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .dashboard-header i {
            font-size: 40px;
            margin-right: 20px;
            color: var(--primary);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #FFE100;
            margin-top: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }

        .btn-save {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-save:hover {
            background: #4b52ff;
        }

        /* Comic List Styles */
        .comics-list {
            display: grid;
            gap: 15px;
        }

        .comic-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .comic-item:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .comic-info h4 {
            margin: 0 0 5px 0;
            color: white;
        }

        .comic-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .comic-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            color: white;
            text-decoration: none;
        }

        .btn-load {
            background: var(--secondary);
        }

        .btn-delete {
            background: #ff4757;
        }

        .btn-load:hover {
            background: #5352ed;
        }

        .btn-delete:hover {
            background: #ff6b81;
        }
    </style>
</head>

<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-user-circle"></i>
            <h1><a href="index.html" style="color:white; text-decoration:none;">ComicForge</a> / Profile</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn secondary">Back to App</a>
        </div>
    </header>

    <div class="profile-container">
        <!-- Dashboard Section -->
        <div class="dashboard-card">
            <div class="dashboard-header">
                <i class="fa-solid fa-id-card"></i>
                <div>
                    <h2 id="user-email">Loading...</h2>
                    <span id="user-role"
                        style="background:var(--accent); color:black; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:bold;">User</span>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-label">Available Credits</div>
                    <div class="stat-value" id="credit-balance">...</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Account Status</div>
                    <div class="stat-value" style="color:var(--accent);">Active</div>
                </div>
            </div>
            <div style="margin-top:20px; text-align:center;">
                <a href="pricing.html" class="btn secondary" style="color:#FFE100;">Get More Credits</a>
            </div>
        </div>

        <!-- Saved Comics Section -->
        <div class="dashboard-card">
            <div class="dashboard-header">
                <i class="fa-solid fa-book-open"></i>
                <h2>Saved Comics</h2>
            </div>
            <div id="comics-list" class="comics-list">
                <p style="opacity:0.7">Loading comics...</p>
            </div>
        </div>


        <!-- Security Section -->
        <div class="dashboard-card">
            <h3><i class="fa-solid fa-lock"></i> Change Password</h3>
            <p style="opacity:0.7; margin-bottom:20px; font-size:14px;">Ensure you remember your old password to set a
                new one.</p>

            <form id="password-form">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="old-pass" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-pass" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm-pass" required>
                </div>
                <button type="submit" class="btn-save">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // 1. Load Profile
            try {
                const res = await fetch('/api/user/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error("Failed to load profile");

                const user = await res.json();
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-role').innerText = user.role.toUpperCase();
                document.getElementById('credit-balance').innerText = user.credits;

                if (user.role === 'admin') {
                    document.getElementById('credit-balance').innerText = "Unlimited";
                }
            } catch (e) {
                console.error("Profile load error:", e);
                // alert("Session expired or error: " + e.message); 
                // Don't redirect immediately to allow debugging
                document.getElementById('user-email').innerText = "Auth Error: " + e.message;
            }

            // 2. Change Password Handler
            document.getElementById('password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const oldPass = document.getElementById('old-pass').value;
                const newPass = document.getElementById('new-pass').value;
                const confirmPass = document.getElementById('confirm-pass').value;

                if (newPass !== confirmPass) {
                    alert("New passwords do not match!");
                    return;
                }

                try {
                    const btn = e.target.querySelector('button');
                    btn.disabled = true;
                    btn.innerText = "Updating...";

                    const res = await fetch('/api/auth/change-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ old_password: oldPass, new_password: newPass })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        alert("Password updated successfully!");
                        e.target.reset();
                    } else {
                        alert("Failed: " + data.error);
                    }
                } catch (err) {
                    alert("Error: " + err.message);
                } finally {
                    const btn = e.target.querySelector('button');
                    btn.disabled = false;
                    btn.innerText = "Update Password";
                }
            });

            // 3. Load Saved Comics
            loadComics();

            async function loadComics() {
                const listEl = document.getElementById('comics-list');
                try {
                    const res = await fetch('/api/comics/list', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });

                    if (!res.ok) throw new Error("Could not fetch comics");

                    const comics = await res.json();

                    if (comics.length === 0) {
                        listEl.innerHTML = '<p style="opacity:0.7; font-style:italic;">No saved comics yet.</p>';
                        return;
                    }

                    listEl.innerHTML = '';
                    comics.forEach(comic => {
                        const date = new Date(comic.created_at * 1000).toLocaleString();
                        const div = document.createElement('div');
                        div.className = 'comic-item';
                        div.innerHTML = `
                            <div class="comic-info">
                                <h4>${comic.title}</h4>
                                <span><i class="fa-regular fa-clock"></i> ${date}</span>
                            </div>
                            <div class="comic-actions">
                                <a href="index.html?load=${comic.id}" class="btn-sm btn-load">
                                    <i class="fa-solid fa-folder-open"></i> Load
                                </a>
                                <button onclick="deleteComic(${comic.id}, this)" class="btn-sm btn-delete">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        `;
                        listEl.appendChild(div);
                    });

                } catch (e) {
                    listEl.innerHTML = `<p style="color:red;">Error loading comics: ${e.message}</p>`;
                }
            }

            // Expose delete function globally
            window.deleteComic = async (id, btn) => {
                if (!confirm("Are you sure you want to delete this comic?")) return;

                const originalContent = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                btn.disabled = true;

                try {
                    const res = await fetch('/api/comics/delete', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ id: id })
                    });

                    if (res.ok) {
                        // Remove element
                        btn.closest('.comic-item').remove();
                        // If empty, show message
                        if (document.querySelectorAll('.comic-item').length === 0) {
                            document.getElementById('comics-list').innerHTML = '<p style="opacity:0.7; font-style:italic;">No saved comics yet.</p>';
                        }
                    } else {
                        alert("Failed to delete.");
                    }
                } catch (e) {
                    alert("Error: " + e.message);
                } finally {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            };
        });
    </script>
</body>

</html>
