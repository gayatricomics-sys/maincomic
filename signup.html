<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up - ComicForge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background: var(--primary-hover);
        }

        .links {
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2><i class="fa-solid fa-user-plus"></i> Sign Up</h2>
        <form id="signup-form">
            <input type="email" id="email" class="auth-input" placeholder="Email" required>
            <input type="password" id="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>
        <div class="links">
            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.status === 201) {
                    alert("Account created! Please login.");
                    window.location.href = 'login.html';
                } else {
                    // Show specific error from server
                    alert("Signup Failed: " + (data.error || res.statusText));
                }
            } catch (err) {
                console.error(err);
                alert("Network/Server Error: " + err.message);
            }
        });
    </script>
</body>

</html>
