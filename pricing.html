<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pricing - ComicForge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .pricing-container {
            max-width: 900px;
            margin: 50px auto;
            text-align: center;
            color: white;
        }

        .plans {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .plan-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            width: 250px;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .plan-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
        }

        .plan-price {
            font-size: 32px;
            font-weight: bold;
            margin: 20px 0;
            color: #FFE100;
        }

        .plan-credits {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .btn-buy {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .btn-buy:hover {
            background: var(--primary-hover);
        }
    </style>
</head>

<body>
    <header class="app-header">
        <div class="logo">
            <i class="fa-solid fa-gem"></i>
            <h1>Get Credits</h1>
        </div>
        <div class="header-actions">
            <a href="index.html" class="btn secondary">Back to App</a>
        </div>
    </header>

    <div class="pricing-container">
        <h2>Choose a Plan</h2>
        <p>Purchase credits to generate amazing AI comics.</p>

        <div class="plans">
            <!-- Starter -->
            <div class="plan-card">
                <h3>Starter</h3>
                <div class="plan-price">₹500</div>
                <div class="plan-credits">5 Comics</div>
                <button class="btn-buy" onclick="buy(5)">Buy Now</button>
            </div>

            <!-- Pro -->
            <div class="plan-card" style="border-color: #00d2ff; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);">
                <div
                    style="position:absolute; top:0; right:0; background:#00d2ff; color:black; font-size:10px; padding:2px 8px; font-weight:bold;">
                    POPULAR</div>
                <h3>Pro</h3>
                <div class="plan-price">₹999</div>
                <div class="plan-credits">10 Comics</div>
                <button class="btn-buy" onclick="buy(10)">Buy Now</button>
            </div>

            <!-- Ultimate -->
            <div class="plan-card">
                <h3>Ultimate</h3>
                <div class="plan-price">₹1800</div>
                <div class="plan-credits">15 Comics</div>
                <button class="btn-buy" onclick="buy(15)">Buy Now</button>
            </div>
        </div>
    </div>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        async function buy(planAmount) {
            const token = localStorage.getItem('authToken');
            if (!token) {
                alert("Please login first!");
                window.location.href = 'login.html';
                return;
            }

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "Initializing...";
            btn.disabled = true;

            try {
                // 1. Create Order
                const res = await fetch('/api/payment/create-order', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ plan_id: planAmount })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Order creation failed");

                // 2. Open Razorpay
                const options = {
                    "key": data.key_id,
                    "amount": data.amount,
                    "currency": "INR",
                    "name": "ComicForge",
                    "description": "Credits Plan",
                    "order_id": data.order_id,
                    "handler": async function (response){
                        // 3. Verify Payment
                        btn.innerText = "Verifying...";
                        try {
                            const verifyRes = await fetch('/api/payment/verify', {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': 'Bearer ' + token
                                },
                                body: JSON.stringify({
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_signature: response.razorpay_signature,
                                    plan_id: planAmount
                                })
                            });
                            
                            const verifyData = await verifyRes.json();
                            if(verifyRes.ok) {
                                alert("Payment Successful! Credits added.");
                                window.location.href = 'index.html';
                            } else {
                                alert("Verification Failed: " + verifyData.error);
                            }
                        } catch (e) {
                            alert("Verification Network Error: " + e.message);
                        } finally {
                             btn.innerText = originalText;
                             btn.disabled = false;
                        }
                    },
                    "prefill": {
                        "email": localStorage.getItem('userEmail') || ""
                    },
                    "theme": { "color": "#FF4757" }
                };
                
                const rzp1 = new Razorpay(options);
                rzp1.on('payment.failed', function (response){
                    alert("Payment Failed: " + response.error.description);
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
                rzp1.open();

            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
