<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollinations Direct Test</title>
</head>

<body>
    <h1>Pollinations Direct Image Test</h1>

    <button onclick="loadImage('flux')">Load Flux</button>
    <button onclick="loadImage('turbo')">Load Turbo</button>

    <div id="container"></div>

    <script>
        function loadImage(model) {
            const seed = Math.floor(Math.random() * 1000);
            const url = `https://pollinations.ai/p/superhero%20cat?width=512&height=512&seed=${seed}&model=${model}&nologo=true`;

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => {
                console.log('Success:', model);
                document.getElementById('container').appendChild(img);
            };
            img.onerror = (e) => {
                console.error('Error:', model, e);
                document.getElementById('container').innerHTML += `<p>Error loading ${model}</p>`;
            };
            img.src = url;
        }
    </script>
</body>

</html>
